<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="John P Warren site mark">
  <!-- Background: paper cream -->
  <rect width="64" height="64" rx="6" fill="#f3efe6"/>

  <!-- Subtle forest border -->
  <rect x="1" y="1" width="62" height="62" rx="5" fill="none" stroke="#3d5b3f" stroke-width="1.5"/>

  <!-- Monogram "jw" in serif italic, forest green -->
  <text x="32" y="46" font-family="Palatino Linotype, Palatino, Georgia, serif" font-size="38" font-weight="700" font-style="italic" fill="#3d5b3f" text-anchor="middle">jw</text>
</svg>
